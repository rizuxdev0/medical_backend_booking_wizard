name: Deploy to Render

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build check
        run: npm run build

      - name: Deploy to Render
        if: github.event_name == 'push'
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
