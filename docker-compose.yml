version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: medical_app
    ports:
      - "5433:5432" # Use 5433 to avoid conflict with local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
